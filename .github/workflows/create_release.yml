name: Create Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version semver (example: 1.2.3)"
        required: true
        type: string
      target_branch:
        description: Branch to release from
        required: false
        default: main
        type: string
      draft_release:
        description: Create GitHub release as draft
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.target_branch }}
          token: ${{ secrets.RELEASE_BOT_TOKEN }}

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Composer dependency security audit
        if: hashFiles('composer.lock') != ''
        run: composer audit --locked --no-interaction

      - name: Validate version input
        shell: bash
        run: |
          if [[ ! "${{ inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Version must be in X.Y.Z format"
            exit 1
          fi

      - name: Bump plugin version files
        run: php bin/bump-version.php ${{ inputs.version }}

      - name: Validate bumped version matches plugin header
        shell: bash
        run: |
          MAIN_FILE=$(php -r '$files=glob("*.php"); foreach($files as $f){$c=file_get_contents($f); if(strpos($c,"Plugin Name:")!==false){echo $f; break;}}')
          [ -n "$MAIN_FILE" ] || { echo "::error::Could not detect plugin main file"; exit 1; }
          HEADER_VERSION=$(grep -Ei '^[[:space:]]*[*#/]{0,2}[[:space:]]*Version:[[:space:]]*[0-9]+([.][0-9]+){1,3}' -m1 "$MAIN_FILE" | sed -E 's/.*Version:[[:space:]]*([0-9]+([.][0-9]+){1,3}).*/\1/' || true)
          [ "$HEADER_VERSION" = "${{ inputs.version }}" ] || { echo "::error::Header version mismatch: $HEADER_VERSION"; exit 1; }

      - name: Lint PHP files
        shell: bash
        run: |
          set -euo pipefail
          mapfile -d '' php_files < <(find . -type f -name '*.php' -not -path './.git/*' -print0)
          [ "${#php_files[@]}" -gt 0 ] || { echo "::error::No PHP files found to lint"; exit 1; }

          for file in "${php_files[@]}"; do
            php -l "$file"
          done

      - name: Smoke test plugin bootstrap
        shell: bash
        run: |
          set -euo pipefail

          MAIN_FILE=$(php -r '$files=glob("*.php"); foreach($files as $f){$c=file_get_contents($f); if(strpos($c,"Plugin Name:")!==false){echo $f; break;}}')
          [ -n "$MAIN_FILE" ] || { echo "::error::Could not detect plugin main file"; exit 1; }
          export MAIN_FILE

          php <<'PHP'
          <?php
          $mainFile = getenv('MAIN_FILE') ?: '';
          if ('' === $mainFile || ! file_exists($mainFile)) {
            fwrite(STDERR, "Plugin main file missing for smoke test\n");
            exit(1);
          }

          if (! defined('ABSPATH')) {
            define('ABSPATH', __DIR__ . '/');
          }

          function plugin_dir_path($file) { return dirname($file) . '/'; }
          function plugin_dir_url($file) { return 'https://example.test/' . basename(dirname($file)) . '/'; }
          function is_admin() { return false; }
          function add_action($hook, $callback, $priority = 10, $accepted_args = 1) { return true; }
          function add_filter($hook, $callback, $priority = 10, $accepted_args = 1) { return true; }
          function add_shortcode($tag, $callback) { return true; }

          require_once $mainFile;

          echo "Plugin loaded successfully\n";
          PHP

      - name: Commit version bump
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes detected after bump-version."
          else
            git add -A
            git commit -m "Release v${{ inputs.version }}"
          fi

      - name: Create and push tag
        shell: bash
        run: |
          git fetch --tags
          if git rev-parse "v${{ inputs.version }}" >/dev/null 2>&1; then
            echo "::error::Tag v${{ inputs.version }} already exists"
            exit 1
          fi
          git push origin HEAD:${{ inputs.target_branch }}
          git tag "v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ inputs.version }}
          generate_release_notes: true
          draft: ${{ inputs.draft_release }}
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN }}
