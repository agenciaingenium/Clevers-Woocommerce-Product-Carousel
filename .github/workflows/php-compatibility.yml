name: PHP Compatibility Matrix

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version:
          - '7.4'
          - '8.0'
          - '8.1'
          - '8.2'
          - '8.3'
          - '8.4'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: composer:v2, phpunit:9.6

      - name: Install Composer dependencies
        if: hashFiles('composer.json') != ''
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Lint and static analysis
        if: matrix.php-version == '8.2' && hashFiles('composer.json') != ''
        run: composer lint

      - name: Lint PHP files (fallback)
        if: matrix.php-version != '8.2' || hashFiles('composer.json') == ''
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r -d '' file; do
            php -l "$file"
          done < <(find . -type f -name '*.php' -not -path './.git/*' -print0)

      - name: Run unit tests
        run: phpunit --configuration phpunit.xml.dist
